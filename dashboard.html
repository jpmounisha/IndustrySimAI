<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndustrySimAI Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.navbar{
  background:#1e293b;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:8px;
  border:none;
  cursor:pointer;
  background:#38bdf8;
  font-weight:bold;
}

.progress{
  background:#334155;
  height:10px;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:10px;
  background:#38bdf8;
  width:40%;
}

#roadmap{
  margin-top:20px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>IndustrySimAI Dashboard</h2>
  <span>Student Mode</span>
</div>

<div class="container">

<!-- CARDS -->
<div class="grid">

  <div class="card">
    <h3>Skill Score</h3>
    <p id="skillText">AI Basics</p>
    <div class="progress">
      <div class="fill" id="skillBar"></div>
    </div>
    <button onclick="doTask()">Complete Task</button>
  </div>

  <div class="card">
    <h3>XP Points</h3>
    <p id="xp">0 XP</p>
    <button onclick="gainXP()">Gain XP</button>
  </div>

  <div class="card">
    <div id="roadmapBox">
  <h3>📍 Personalized Roadmap</h3>
  <div id="roadmap">Click button to generate roadmap</div>
</div>

<button onclick="generateRoadmap()">Generate Roadmap</button>

</div>

<!-- ROADMAP OUTPUT -->
<div id="roadmap">
Your personalized roadmap will appear here...
</div>

</div>
<script>
let skill = 40; // make sure this exists above

function generateRoadmap() {

  const el = document.getElementById("roadmap");

  if (!el) return;

  let text = "";

  if (skill < 50) {
    text =
`BEGINNER ROADMAP:
- Learn HTML
- Learn CSS
- Learn JavaScript basics
- Build simple projects`;
  }

  else if (skill < 80) {
    text =
`INTERMEDIATE ROADMAP:
- Learn APIs
- DOM manipulation
- Build weather app
- Build chatbot`;
  }

  else {
    text =
`ADVANCED ROADMAP:
- Learn AI/ML basics
- Build AI projects
- Work on hackathon-level systems`;
  }

  el.innerText = text;
}
  
</script>s
</body>
</html>
